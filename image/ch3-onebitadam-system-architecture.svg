<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .t{font-family:'Times New Roman',serif;fill:#111}
      .title{font-size:26px;font-weight:700}
      .h{font-size:20px;font-weight:700}
      .m{font-size:16px;font-weight:700}
      .s{font-size:14px;font-weight:700}
      .arrow{stroke-width:4;fill:none;marker-end:url(#a)}
      .d{stroke-dasharray:10 8}
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1360" height="760" fill="#d9d9d9" stroke="#666" stroke-width="4"/>
  <text x="700" y="66" class="t title" text-anchor="middle">统一 k-bit/1-bit 随机舍入量化在分布式框架中的细粒度分层集成架构</text>

  <rect x="70" y="95" width="1260" height="200" fill="#efefef" stroke="#666" stroke-width="4"/>
  <text x="90" y="123" class="t h">L1 框架层（Distributed Training Framework）</text>
  <rect x="100" y="160" width="250" height="90" fill="#dae8fc" stroke="#6c8ebf" stroke-width="4"/>
  <text x="225" y="192" class="t m" text-anchor="middle">训练编排子模块</text>
  <text x="225" y="214" class="t s" text-anchor="middle">Forward/Backward 调度</text>
  <rect x="380" y="160" width="250" height="90" fill="#f8cecc" stroke="#b85450" stroke-width="4"/>
  <text x="505" y="192" class="t m" text-anchor="middle">梯度收集子模块</text>
  <text x="505" y="214" class="t s" text-anchor="middle">参数梯度 flatten / bucket</text>
  <rect x="660" y="160" width="250" height="90" fill="#fff2cc" stroke="#d6b656" stroke-width="4"/>
  <text x="785" y="192" class="t m" text-anchor="middle">量化入口接口</text>
  <text x="785" y="214" class="t s" text-anchor="middle">输出 G_t, delta_t, b</text>
  <rect x="940" y="160" width="250" height="90" fill="#d5e8d4" stroke="#82b366" stroke-width="4"/>
  <text x="1065" y="192" class="t m" text-anchor="middle">参数更新子模块</text>
  <text x="1065" y="214" class="t s" text-anchor="middle">接收 G' 执行 step</text>
  <rect x="1220" y="160" width="90" height="90" fill="#e1d5e7" stroke="#9673a6" stroke-width="4"/>
  <text x="1265" y="187" class="t s" text-anchor="middle">状态</text>
  <text x="1265" y="207" class="t s" text-anchor="middle">管理</text>

  <rect x="70" y="315" width="1260" height="250" fill="#efefef" stroke="#666" stroke-width="4"/>
  <text x="90" y="343" class="t h">L2 压缩层（K-bit Quantization Layer）</text>
  <rect x="95" y="385" width="190" height="80" fill="#fff2cc" stroke="#d6b656" stroke-width="4"/>
  <text x="190" y="413" class="t s" text-anchor="middle">EMA 统计模块</text>
  <text x="190" y="435" class="t s" text-anchor="middle">m_t, v_t 更新</text>
  <rect x="305" y="385" width="190" height="80" fill="#dae8fc" stroke="#6c8ebf" stroke-width="4"/>
  <text x="400" y="413" class="t s" text-anchor="middle">归一化/裁剪模块</text>
  <text x="400" y="435" class="t s" text-anchor="middle">u_t = clip((m/v+1)/2)</text>
  <rect x="515" y="385" width="190" height="80" fill="#e1d5e7" stroke="#9673a6" stroke-width="4"/>
  <text x="610" y="413" class="t s" text-anchor="middle">随机舍入模块</text>
  <text x="610" y="435" class="t s" text-anchor="middle">Bernoulli(alpha)</text>
  <rect x="725" y="385" width="190" height="80" fill="#d5e8d4" stroke="#82b366" stroke-width="4"/>
  <text x="820" y="413" class="t s" text-anchor="middle">误差反馈模块</text>
  <text x="820" y="435" class="t s" text-anchor="middle">delta_t 累积/回注</text>
  <rect x="935" y="385" width="180" height="80" fill="#dae8fc" stroke="#6c8ebf" stroke-width="4"/>
  <text x="1025" y="413" class="t s" text-anchor="middle">位打包模块</text>
  <text x="1025" y="435" class="t s" text-anchor="middle">PackBits(q_t,b)</text>
  <rect x="1135" y="385" width="180" height="80" fill="#fff2cc" stroke="#d6b656" stroke-width="4"/>
  <text x="1225" y="413" class="t s" text-anchor="middle">元数据封装</text>
  <text x="1225" y="435" class="t s" text-anchor="middle">shape/numel/bits</text>
  <rect x="475" y="485" width="450" height="60" fill="#f8cecc" stroke="#b85450" stroke-width="4"/>
  <text x="700" y="520" class="t m" text-anchor="middle">压缩层输出接口：C + metadata</text>

  <rect x="70" y="580" width="1260" height="150" fill="#efefef" stroke="#666" stroke-width="4"/>
  <text x="90" y="608" class="t h">L3 集合通信层（Collective Communication Layer）</text>
  <rect x="90" y="620" width="260" height="95" fill="#dae8fc" stroke="#6c8ebf" stroke-width="4"/>
  <text x="220" y="648" class="t s" text-anchor="middle">路径选择模块</text>
  <text x="220" y="668" class="t s" text-anchor="middle">b&lt;16: low-bit path</text>
  <text x="220" y="688" class="t s" text-anchor="middle">b=16: fp16 path</text>
  <rect x="370" y="620" width="220" height="95" fill="#fff2cc" stroke="#d6b656" stroke-width="4"/>
  <text x="480" y="655" class="t m" text-anchor="middle">低比特分片交换</text>
  <text x="480" y="678" class="t s" text-anchor="middle">AllToAll (A2A)</text>
  <rect x="610" y="620" width="240" height="95" fill="#d5e8d4" stroke="#82b366" stroke-width="4"/>
  <text x="730" y="655" class="t m" text-anchor="middle">低比特聚合恢复</text>
  <text x="730" y="678" class="t s" text-anchor="middle">dequantize_and_reduce</text>
  <rect x="870" y="620" width="210" height="95" fill="#e1d5e7" stroke="#9673a6" stroke-width="4"/>
  <text x="975" y="655" class="t m" text-anchor="middle">16-bit 快路径</text>
  <text x="975" y="678" class="t s" text-anchor="middle">直接 All-Reduce</text>
  <rect x="1100" y="620" width="220" height="95" fill="#d5e8d4" stroke="#82b366" stroke-width="4"/>
  <text x="1210" y="655" class="t m" text-anchor="middle">统一输出模块</text>
  <text x="1210" y="678" class="t s" text-anchor="middle">输出同步梯度 G'</text>

  <rect x="130" y="742" width="1140" height="30" fill="#efefef" stroke="#666" stroke-width="3"/>
  <text x="700" y="762" class="t s" text-anchor="middle">全局配置：位宽 b in {1,2,4,8,16}；WorldGroup；误差反馈开关；压缩元数据协议</text>

  <path d="M785 250 L190 385" class="arrow" stroke="#4f81bd"/>
  <text x="500" y="315" class="t s" fill="#4f81bd">层间入口 G_t</text>
  <path d="M285 425 L305 425" class="arrow" stroke="#4f81bd"/>
  <path d="M495 425 L515 425" class="arrow" stroke="#4f81bd"/>
  <path d="M705 425 L725 425" class="arrow" stroke="#4f81bd"/>
  <path d="M915 425 L935 425" class="arrow" stroke="#4f81bd"/>
  <path d="M1115 425 L1135 425" class="arrow" stroke="#4f81bd"/>
  <path d="M1225 465 L700 485" class="arrow" stroke="#4f81bd"/>
  <text x="950" y="475" class="t s" fill="#4f81bd">压缩层输出</text>
  <path d="M700 545 L220 620" class="arrow" stroke="#4f81bd"/>
  <text x="460" y="575" class="t s" fill="#4f81bd">下钻到通信层</text>
  <path d="M350 668 L370 668" class="arrow" stroke="#4f81bd"/>
  <text x="356" y="655" class="t s" fill="#4f81bd">low-bit</text>
  <path d="M590 668 L610 668" class="arrow" stroke="#82b366"/>
  <path d="M350 690 L870 690" class="arrow d" stroke="#9673a6"/>
  <text x="620" y="706" class="t s" fill="#9673a6">16-bit fast path</text>
  <path d="M850 668 L1100 668" class="arrow" stroke="#82b366"/>
  <path d="M1080 668 L1100 668" class="arrow" stroke="#82b366"/>
  <path d="M1210 620 L1240 560 L1240 205 L1190 205" class="arrow" stroke="#82b366"/>
  <text x="1220" y="548" class="t s" fill="#82b366">同步梯度 G' 回传</text>
  <path d="M820 385 L820 360 L820 205 L630 205" class="arrow d" stroke="#9673a6"/>
  <text x="826" y="344" class="t s" fill="#9673a6">反馈通道 delta</text>
  <path d="M450 742 L450 715" class="arrow d" stroke="#9673a6"/>
  <text x="472" y="731" class="t s" fill="#9673a6">配置注入</text>
</svg>
