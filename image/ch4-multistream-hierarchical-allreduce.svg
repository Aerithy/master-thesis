<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="650" viewBox="0 0 2200 650">
  <defs>
    <style>
      .t{font-family:'Times New Roman',serif;fill:#111}
      .title{font-size:34px;font-weight:700}
