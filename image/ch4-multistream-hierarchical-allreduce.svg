  <rect x="350" y="146" width="1520" height="42" fill="#e1d5e7" stroke="#9673a6" stroke-width="3"/>
  <text x="1110" y="173" class="t m" text-anchor="middle">Pipelining</text>
  <rect x="1870" y="146" width="250" height="42" fill="#d5e8d4" stroke="#82b366" stroke-width="3"/>
