  <rect x="20" y="110" width="2160" height="400" fill="#fff" stroke="#666" stroke-width="4"/>
  <text x="1100" y="140" class="t h" text-anchor="middle">Timeline View: chunk c0-c3, All-Reduce and Broadcast</text>
  <text x="1100" y="168" class="t s" text-anchor="middle">time -&gt;</text>

  <rect x="80" y="146" width="270" height="42" fill="#fff2cc" stroke="#d6b656" stroke-width="3"/>
